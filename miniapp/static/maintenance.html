<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Обновляемся…</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0e0f12; color: #e8eaed; padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .c { max-width: 320px; }
      .s {
        width: 44px; height: 44px; margin: 0 auto 16px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.18); border-top-color: #4aa8ff;
        animation: r 0.9s linear infinite;
      }
      @keyframes r { to { transform: rotate(360deg); } }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #9aa0a6; margin: 0; }
    </style>
    <script>
      // Сами перезагрузимся, когда сервис вернётся.
      setTimeout(function () { location.reload(); }, 5000);
    </script>
  </head>
  <body>
    <div class="c">
      <div class="s"></div>
      <h1>Обновляемся 🛠️</h1>
      <p>Выкатываем свежую версию — вернёмся через минуту.<br />Страница перезагрузится сама.</p>
    </div>
  </body>
</html>
