version: "3.9"

services:
#  postgres:
#    image: postgres:14
#    env_file:
#      - ./.env
#    volumes:
#      - pgdata:/var/lib/postgresql/data
#    ports:
#      - "5432:5432"

  migrations:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - ./.env
#    entrypoint: ["./scripts/wait-for-postgres.sh", "postgres"]
    command: alembic upgrade head

  bot:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - ./.env
    environment:
      - NLP_SERVICE_URL=http://nlp:8000
    depends_on:
      migrations:
        condition: service_completed_successfully
      nlp:
        condition: service_started

  nlp:
    build:
      context: .
      dockerfile: nlp/Dockerfile
    env_file:
      - ./.env
    volumes:
      - hf_cache:/app/.cache/huggingface
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app:/app/bot
    ports:
      - "8002:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully

  miniapp:
    build:
      context: .
      dockerfile: miniapp/Dockerfile
      args:
        VITE_API_BASE_URL: ${MINIAPP_API_BASE_URL:-/api/v1}
    ports:
      - "8003:80"

volumes:
  hf_cache:

