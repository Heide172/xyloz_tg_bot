version: "3.9"

services:
#  postgres:
#    image: postgres:14
#    env_file:
#      - ./.env
#    volumes:
#      - pgdata:/var/lib/postgresql/data
#    ports:
#      - "5432:5432"

  migrations:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - ./.env
#    entrypoint: ["./scripts/wait-for-postgres.sh", "postgres"]
    command: sh -c "alembic revision --autogenerate -m 'Initial migration' && alembic upgrade head"

  bot:
    build:
      context: .
      dockerfile: bot.Dockerfile
    env_file:
      - ./.env
    environment:
      - NLP_SERVICE_URL=http://nlp:8000
    depends_on:
      - migrations
      - nlp

  nlp:
    build:
      context: .
      dockerfile: nlp/Dockerfile
    env_file:
      - ./.env
    volumes:
      - hf_cache:/app/.cache/huggingface
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  hf_cache:

